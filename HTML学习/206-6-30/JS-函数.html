<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-函数</title>
</head>
<body>
    <!-- 定义函数 -->
    <script>
        // 方式一：
        function add(a,b) {
            return a+b;
        }

        var result=add(10,6);
        alert(result);

        //方式二：
        var add=function(a,b){
            return a+b;
        }

        var result=add(10,20);
        alert(result);

    </script>
</body>
</html>
